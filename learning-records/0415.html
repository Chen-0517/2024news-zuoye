<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript基础知识练习</title>
 </head>
 <body>
    <h1>JavaScript基础知识练习</h1>
    <script>
        // 变量的定义
        var name = "Alice";
        let age = 30;
        const PI =3.14;
        // 打印变量
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("PI:", PI);
        // 变量的类型
        console.log("Type of name:", typeof name);
        console.log("Type of age:", typeof age);
        console.log("Type of PI:", typeof PI);
        // 表达式和运算
        let sum = age + 10;                                             
        let product = age * 2;
        console.log("Sum:", sum);
        console.log("Product:", product);
        console.log("Is age greater than 30?", age > 30);
        console.log("Is age equal to 30?", age === 30);
        console.log("Is age not equal to 40?", age !== 40);
        console.log("Is age less than or equal to 40?", age <= 40);
        // 流程控制
        if (age > 30) {
            console.log("Age is greater than 30");
        } else {
            console.log("Age is 30 or less");
        }
        // 函数定义和调用
        function greet(name) {
            return "Hello, " + name + "!";
        }
        console.log(greet("Alice"));
        console.log(greet("Bob"));
        console.log(greet("Charlie"));
        console.log(greet("David"));
        console.log(greet("Eve"));
        // javaScript中的数据类型
        let isStudent = true; // Boolean
        console.log("Is student?", isStudent);
        let score = null; // Null
        console.log("Score:", score);
        let undefinedVariable; // Undefined
        console.log("Undefined variable:", undefinedVariable); 
        let bigIntValue = 1234567890123456789012345678901234567890n; // BigInt
        console.log("BigInt value:", bigIntValue);
        let symbolValue = Symbol("unique"); // Symbol
        console.log("Symbol value:", symbolValue); 
        // 运算符和表达式
        console.log("Arithmetic: age + 10 =", age + 10);
        console.log("Arithmetic: age - 5 =", age - 5);
        console.log("Arithmetic: age * 2 =", age * 2);
        console.log("Arithmetic: age / 2 =", age / 2);
        console.log("Arithmetic: age % 3 =", age % 3);
        console.log("Comparison: age > 30 =", age > 30);
        console.log("Comparison: age < 40 =", age < 40);
        console.log("Comparison: age >= 30 =", age >= 30);
        console.log("Comparison: age <= 30 =", age <= 30);
        console.log("Comparison: age === 30 =", age === 30);
        console.log("Comparison: age !== 40 =", age !== 40);
        console.log("Logical: (age > 25) && (age < 35) =", (age > 25) && (age < 35));
        console.log("Logical: (age < 25) || (age > 35) =", (age < 25) || (age > 35));
        console.log("Logical: !(age === 30) =", !(age === 30));
    </script>
</body>
</html>
